spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

jwt:
  secret: test-secret-key-for-unit-testing-only-32bytes
  expiration-ms: 86400000

kafka:
  topics:
    reservations: reservations

outbox:
  relay:
    fixed-delay-ms: 5000

services:
  notification-url: http://localhost:8082
